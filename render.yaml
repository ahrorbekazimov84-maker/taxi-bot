services:
  - type: postgres
    name: taxi-db
    region: oregon
    plan: free
    postgresVersion: 15
    databaseName: taxi_db

  - type: web_service
    name: taxi-backend
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    buildFilter:
      paths:
        - backend/**
    envVars:
      - key: DATABASE_URL
        fromService:
          name: taxi-db
          property: connectionString
      - key: NODE_VERSION
        value: 20.10.0
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d

  - type: static_site
    name: taxi-crm
    env: static
    region: oregon
    plan: free
    rootDir: crm
    buildCommand: npm install && npm run build
    publishPath: build
    autoDeploy: true
    buildFilter:
      paths:
        - crm/**
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        value: https://taxi-backend.onrender.com/api
      - key: CI
        value: false
      - key: NODE_VERSION
        value: 20.10.0
